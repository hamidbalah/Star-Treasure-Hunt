<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مملكة المغامرات</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .game-container {
            text-align: center;
            color: white;
        }
        
        h1 {
            font-size: 4em;
            margin-bottom: 20px;
            text-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .start-btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 20px 50px;
            font-size: 1.5em;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }
        
        .start-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }
        
        #gameCanvas {
            display: none;
            background: #87CEEB;
            border: 5px solid white;
            box-shadow: 0 10px 50px rgba(0,0,0,0.5);
        }
        
        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 1.2em;
            display: none;
        }
    </style>
</head>
<body>
    <div class="game-container" id="menu">
        <h1>🏰 مملكة المغامرات</h1>
        <p style="font-size: 1.5em; margin-bottom: 30px;">⚔️ ادخل القلعة واهزم الوحوش!</p>
        <button class="start-btn" onclick="startGame()">🎮 ابدأ اللعب</button>
    </div>
    
    <div class="hud" id="hud">
        <div>❤️ الصحة: <span id="health">100</span></div>
        <div>💰 العملات: <span id="coins">0</span></div>
        <div>⭐ النقاط: <span id="score">0</span></div>
    </div>
    
    <canvas id="gameCanvas"></canvas>

    <script>
        // إعدادات Canvas
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 1200;
        canvas.height = 600;
        
        // متغيرات اللعبة
        let gameRunning = false;
        let score = 0;
        let coins = 0;
        let health = 100;
        
        // كلاس اللاعب
        class Player {
            constructor() {
                this.x = 100;
                this.y = 450;
                this.width = 50;
                this.height = 60;
                this.velocityY = 0;
                this.jumping = false;
                this.speed = 5;
            }
            
            draw() {
                // الجسم
                ctx.fillStyle = '#4a69bd';
                ctx.fillRect(this.x + 10, this.y + 20, 30, 35);
                
                // الرأس
                ctx.fillStyle = '#feca57';
                ctx.beginPath();
                ctx.arc(this.x + 25, this.y + 15, 15, 0, Math.PI * 2);
                ctx.fill();
                
                // السيف
                ctx.strokeStyle = '#95a5a6';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(this.x + 45, this.y + 30);
                ctx.lineTo(this.x + 65, this.y + 20);
                ctx.stroke();
            }
            
            update() {
                // الجاذبية
                this.velocityY += 0.8;
                this.y += this.velocityY;
                
                // الأرض
                if (this.y >= 450) {
                    this.y = 450;
                    this.velocityY = 0;
                    this.jumping = false;
                }
            }
            
            jump() {
                if (!this.jumping) {
                    this.velocityY = -15;
                    this.jumping = true;
                }
            }
        }
        
        // إنشاء اللاعب
        let player = new Player();
        
        // بدء اللعبة
        function startGame() {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('gameCanvas').style.display = 'block';
            document.getElementById('hud').style.display = 'block';
            gameRunning = true;
            gameLoop();
        }
        
        // حلقة اللعبة
        function gameLoop() {
            if (!gameRunning) return;
            
            // مسح الشاشة
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // الأرض
            ctx.fillStyle = '#7CFC00';
            ctx.fillRect(0, 510, canvas.width, 90);
            
            // رسم وتحديث اللاعب
            player.update();
            player.draw();
            
            // رسم رسالة
            ctx.fillStyle = 'black';
            ctx.font = '24px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('استخدم المسافة للقفز - الأسهم للحركة', canvas.width/2, 50);
            
            requestAnimationFrame(gameLoop);
        }
        
        // التحكم
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.key === 'ArrowUp') {
                e.preventDefault();
                player.jump();
            }
            if (e.key === 'ArrowRight') {
                player.x += player.speed;
            }
            if (e.key === 'ArrowLeft') {
                player.x -= player.speed;
            }
        });
        
        console.log('🎮 اللعبة جاهزة للعمل!');
    </script>
</body>
</html>
