
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Hunter</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#000022;
    color:white;
    text-align:center;
}

.screen{
    display:none;
    padding:20px;
}

.active{
    display:block;
}

canvas{
    background:#000033;
    border:2px solid white;
    margin-top:10px;
}

button{
    padding:12px 20px;
    margin:10px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.controls{
    margin-top:15px;
}

.control-btn{
    width:80px;
    height:80px;
    font-size:30px;
}
</style>
</head>
<body>

<div id="menu" class="screen active">
    <h1>🚀 Star Hunter</h1>
    <p>🏆 أعلى نتيجة: <span id="highScore">0</span></p>
    <p>🪙 العملات: <span id="coins">0</span></p>
    <button onclick="startGame()">ابدأ اللعبة</button>
</div>

<div id="game" class="screen">
    <h2>⭐ النقاط: <span id="score">0</span></h2>
    <h2>❤️ الأرواح: <span id="lives">3</span></h2>

    <canvas id="canvas"></canvas>

    <div class="controls">
        <button class="control-btn" id="leftBtn">⬅️</button>
        <button class="control-btn" id="rightBtn">➡️</button>
    </div>
</div>

<div id="gameOver" class="screen">
    <h1>💥 انتهت اللعبة</h1>
    <h2>النتيجة: <span id="finalScore">0</span></h2>
    <button onclick="backToMenu()">العودة للقائمة</button>
</div>

<script>
// Canvas Setup
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

canvas.width = Math.min(800, window.innerWidth - 40);
canvas.height = Math.min(600, window.innerHeight - 200);

// Game Variables
let gameActive = false;
let score = 0;
let lives = 3;
let highScore = localStorage.getItem('highScore') || 0;
let totalCoins = localStorage.getItem('coins') || 0;

// Update Display
document.getElementById('highScore').textContent = highScore;
document.getElementById('coins').textContent = totalCoins;

// Player
const player = {
    x: canvas.width / 2 - 25,
    y: canvas.height - 80,
    width: 50,
    height: 50,
    speed: 7,
    dx: 0
};

// Arrays
let stars = [];
let enemies = [];

// Controls
let keys = {};

document.addEventListener('keydown', (e) => {
    keys[e.key] = true;
});

document.addEventListener('keyup', (e) => {
    keys[e.key] = false;
});

// Mobile Controls
document.getElementById('leftBtn').addEventListener('touchstart', () => {
    keys['ArrowLeft'] = true;
});

document.getElementById('leftBtn').addEventListener('touchend', () => {
    keys['ArrowLeft'] = false;
});

document.getElementById('rightBtn').addEventListener('touchstart', () => {
    keys['ArrowRight'] = true;
});

document.getElementById('rightBtn').addEventListener('touchend', () => {
    keys['ArrowRight'] = false;
});

// Star Class
class Star {
    constructor() {
        this.x = Math.random() * (canvas.width - 20);
        this.y = -20;
        this.width = 20;
        this.height = 20;
        this.speed = 2 + Math.random() * 2;
    }

    update() {
        this.y += this.speed;
    }

    draw() {
        ctx.font = '20px Arial';
        ctx.fillText('⭐', this.x, this.y);
    }
}

// Enemy Class
class Enemy {
    constructor() {
        this.x = Math.random() * (canvas.width - 30);
        this.y = -30;
        this.width = 30;
        this.height = 30;
        this.speed = 3 + Math.random() * 2;
    }

    update() {
        this.y += this.speed;
    }

    draw() {
        ctx.font = '30px Arial';
        ctx.fillText('💥', this.x, this.y);
    }
}

// Draw Player
function drawPlayer() {
    ctx.font = '50px Arial';
    ctx.fillText('🚀', player.x, player.y + 40);
}

// Update Player
function updatePlayer() {
    if (keys['ArrowLeft'] && player.x > 0) {
        player.x -= player.speed;
    }

    if (keys['ArrowRight'] && player.x < canvas.width - player.width) {
        player.x += player.speed;
    }
}

// Check Collision
function checkCollision(obj1, obj2) {
    return obj1.x < obj2.x + obj2.width &&
           obj1.x + obj1.width > obj2.x &&
           obj1.y < obj2.y + obj2.height &&
           obj1.y + obj1.height > obj2.y;
}

// Spawn Objects
function spawnObjects() {
    if (Math.random() < 0.02) {
        stars.push(new Star());
    }

    if (Math.random() < 0.015) {
        enemies.push(new Enemy());
    }
}

// Update Game
function update() {
    if (!gameActive) return;

    ctx.fillStyle = '#000033';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#FFFFFF';

    for (let i = 0; i < 100; i++) {
        const x = (i * 37) % canvas.width;
        const y = (i * 73 + Date.now() * 0.05) % canvas.height;
        ctx.fillRect(x, y, 2, 2);
    }

    updatePlayer();
    drawPlayer();

    spawnObjects();

    stars = stars.filter(star => {
        star.update();
        star.draw();

        if (checkCollision(player, star)) {
            score += 10;
            updateScore();
            return false;
        }

        return star.y < canvas.height;
    });

    enemies = enemies.filter(enemy => {
        enemy.update();
        enemy.draw();

        if (checkCollision(player, enemy)) {
            lives--;
            updateLives();

            if (lives <= 0) {
                endGame();
            }

            return false;
        }

        return enemy.y < canvas.height;
    });

    requestAnimationFrame(update);
}

// Update Score
function updateScore() {
    document.getElementById('score').textContent = score;
}

// Update Lives
function updateLives() {
    document.getElementById('lives').textContent = lives;
}

// Start Game
function startGame() {
    gameActive = true;
    score = 0;
    lives = 3;
    stars = [];
    enemies = [];
    player.x = canvas.width / 2 - 25;

    updateScore();
    updateLives();

    showScreen('game');
    update();
}

// End Game
function endGame() {
    gameActive = false;

    if (score > highScore) {
        highScore = score;
        localStorage.setItem('highScore', highScore);
    }

    const coinsEarned = Math.floor(score / 10);
    totalCoins = parseInt(totalCoins) + coinsEarned;
    localStorage.setItem('coins', totalCoins);

    document.getElementById('finalScore').textContent = score;

    showScreen('gameOver');
}

// Back To Menu
function backToMenu() {
    document.getElementById('highScore').textContent = highScore;
    document.getElementById('coins').textContent = totalCoins;

    showScreen('menu');
}

// Show Screen
function showScreen(screenId) {
    document.querySelectorAll('.screen').forEach(screen => {
        screen.classList.remove('active');
    });

    document.getElementById(screenId).classList.add('active');
}

// Resize Canvas
window.addEventListener('resize', () => {
    canvas.width = Math.min(800, window.innerWidth - 40);
    canvas.height = Math.min(600, window.innerHeight - 200);
});

console.log('🎮 اللعبة جاهزة!');
</script>

</body>
</html>
